# TV DMI信号监控 — 每5分钟
# cron agent: 需要LLM推理来读取TradingView MCP数据
# 逻辑: 读TV DMI → 判断等级 → A级/关键位触发时生成卡+推送
name: "TV信号监控·智能推送"
cron: "*/30 * * * *"
no_agent: false
instructions: |
  你是TV缓存维护员。每30分钟读一次TradingView MCP，写入data/tv_dmi_cache.json。
  行情守望(10s实时)会检测等级变化并自动推送关键信号。

  ## 步骤
  1. 调用 mcp_tradingview_data_get_pine_tables + mcp_tradingview_data_get_study_values
  2. 将完整数据写入 data/tv_dmi_cache.json:
  {
    "timestamp": "ISO时间",
    "symbol": "BTCUSDT",
    "grade": "从DMI表取等级",
    "table_raw": ["等级 | ...", "处理 | ...", ...],
    "indicators": {"S_VWAP": ..., "CVD_Value": ..., ...}
  }
  3. 不推送，不运行auto_card。行情守望负责。
enabled: true
